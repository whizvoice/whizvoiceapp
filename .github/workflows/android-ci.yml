name: Android CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "**"
      - "!README.md"
      - "!.github/workflows/android-ci.yml"
  push:
    branches: [main]
    paths:
      - "**"
      - "!README.md"
      - "!.github/workflows/android-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug --stacktrace --parallel --build-cache --configuration-cache

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --parallel --build-cache --configuration-cache

      - name: Generate unit test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Unit Test Results
          path: "app/build/test-results/testDebugUnitTest/TEST-*.xml"
          reporter: java-junit
          fail-on-error: true

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 7

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
          retention-days: 7

  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        api-level: [30]
        target: [default]
        arch: [x86_64]
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free up disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-${{ matrix.target }}-${{ matrix.arch }}-v3

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            echo "🚀 Starting instrumented tests..."

            # Wait for emulator to be ready
            echo "⏳ Waiting for emulator..."
            adb wait-for-device

            # Wait for system to boot
            while [[ -z $(adb shell getprop sys.boot_completed | tr -d '\r') ]]; do
              echo "Still booting..."
              sleep 3
            done

            echo "Emulator ready!"

            # Show device info
            echo "📱 Device Info:"
            echo "Model: $(adb shell getprop ro.product.model)"
            echo "API Level: $(adb shell getprop ro.build.version.sdk)"

            # Build APKs
            echo "🔨 Building APKs..."
            ./gradlew assembleDebug assembleDebugAndroidTest --parallel --build-cache

            if [ $? -ne 0 ]; then
              echo "❌ APK build failed"
              exit 1
            fi

            # Install APKs
            echo "📦 Installing APKs..."
            adb install -r app/build/outputs/apk/debug/app-debug.apk
            adb install -r app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk

            # Run tests (excluding real auth tests for CI)
            echo "🎯 Running instrumented tests..."
            adb shell am instrument -w -r \
              -e notClass com.example.whiz.ui.screens.LoginScreenRealAuthTest \
              com.example.whiz.test/com.example.whiz.HiltTestRunner > test_results.txt 2>&1

            # Check results
            echo "📊 Test Results:"
            cat test_results.txt

            if grep -q "OK (" test_results.txt; then
              PASSED_TESTS=$(grep "OK (" test_results.txt | sed 's/.*OK (\([0-9]*\) tests).*/\1/')
              echo "✅ Instrumented tests completed: $PASSED_TESTS tests passed"
              
              # Create JUnit XML for test reporter
              mkdir -p app/build/outputs/androidTest-results/connected/
              cat > app/build/outputs/androidTest-results/connected/TEST-instrumented.xml << EOF
            <?xml version="1.0" encoding="UTF-8"?>
            <testsuite name="InstrumentedTests" tests="$PASSED_TESTS" failures="0" errors="0" time="0" package="com.example.whiz">
              <testcase name="instrumented_tests" classname="InstrumentedTestExecution" time="0"/>
            </testsuite>
            EOF
              
              exit 0
            elif grep -q "FAILURES!!!" test_results.txt; then
              echo "❌ Some tests failed"
              exit 1
            else
              echo "❌ Test execution failed"
              exit 1
            fi

      - name: Generate instrumented test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Instrumented Test Results (API ${{ matrix.api-level }})
          path: "app/build/outputs/androidTest-results/connected/TEST-*.xml"
          reporter: java-junit
          fail-on-error: true

      - name: Upload instrumented test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          retention-days: 7

  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --parallel --build-cache --configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
