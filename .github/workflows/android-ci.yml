name: Android CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "**"
      - "!README.md"
      - "!.github/workflows/android-ci.yml"
  push:
    branches: [main]
    paths:
      - "**"
      - "!README.md"
      - "!.github/workflows/android-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug --stacktrace --parallel --build-cache --configuration-cache

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --parallel --build-cache --configuration-cache

      - name: Generate unit test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Unit Test Results
          path: "app/build/test-results/testDebugUnitTest/TEST-*.xml"
          reporter: java-junit
          fail-on-error: true

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 7

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
          retention-days: 7

  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        api-level: [31]
        target: [default]
        arch: [x86_64]
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free up disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-combined-${{ matrix.api-level }}-${{ matrix.target }}-${{ matrix.arch }}-v1

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 4096
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup test credentials
        run: |
          echo "🔐 Setting up test credentials for E2E testing..."
          echo '${{ secrets.TEST_CREDENTIALS_JSON }}' > test_credentials.json
          echo "✅ Test credentials file created"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 4096
          disable-animations: true
          script: |
            echo "🚀 Starting comprehensive instrumented tests with REAL credentials..."
            adb wait-for-device
            echo "⏳ Waiting for system boot..."
            sleep 15
            adb shell getprop sys.boot_completed
            sleep 10
            echo "Emulator should be ready!"
            echo "📱 Device Info:"
            adb shell getprop ro.product.model
            adb shell getprop ro.build.version.sdk
            echo "🧹 Cleaning up any existing app installations..."
            adb uninstall com.example.whiz || echo "No existing app to uninstall"
            adb uninstall com.example.whiz.test || echo "No existing test app to uninstall"
            echo "📁 Pushing test credentials to emulator..."
            adb push test_credentials.json /data/local/tmp/test_credentials.json
            echo "🧪 Running ALL tests with REAL credentials (no mocking)..."
            ./gradlew connectedDebugAndroidTest --stacktrace --continue

      - name: Pull screenshots from emulator
        if: always()
        run: |
          echo "📸 Pulling failure screenshots from emulator..."
          adb shell ls -la /sdcard/Pictures/ || echo "No screenshots directory found"
          mkdir -p test-failure-screenshots
          adb pull /sdcard/Pictures/ ./test-failure-screenshots/ || echo "No screenshots to pull"
          echo "📱 Screenshot files found:"
          ls -la ./test-failure-screenshots/ || echo "No screenshots directory created"

      - name: Upload test failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-failure-screenshots-api${{ matrix.api-level }}
          path: test-failure-screenshots/
          retention-days: 30

      - name: Generate instrumented test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Instrumented Test Results (API ${{ matrix.api-level }})
          path: |
            app/build/outputs/androidTest-results/connected/debug/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Debug - List test result files
        if: always()
        run: |
          echo "Searching for test result files..."
          find . -name "TEST-*.xml" -type f 2>/dev/null || echo "No TEST-*.xml files found"
          echo "Checking androidTest-results directory..."
          ls -la app/build/outputs/androidTest-results/ 2>/dev/null || echo "androidTest-results directory not found"
          echo "Checking if connected subdirectory exists..."
          ls -la app/build/outputs/androidTest-results/connected/ 2>/dev/null || echo "connected subdirectory not found"
          echo "Checking test-results directory..."
          ls -la app/build/test-results/ 2>/dev/null || echo "test-results directory not found"

      - name: Upload instrumented test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          retention-days: 7

  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --parallel --build-cache --configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
