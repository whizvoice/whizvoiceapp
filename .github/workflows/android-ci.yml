name: Android CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "**"
      - "!README.md"
      - "!.github/workflows/android-ci.yml"
  push:
    branches: [main]
    paths:
      - "**"
      - "!README.md"
      - "!.github/workflows/android-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'pull_request' }}

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew lintDebug --stacktrace --parallel --build-cache --configuration-cache

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --parallel --build-cache --configuration-cache

      - name: Generate unit test report
        if: success() || failure()
        run: |
          echo "## Unit Test Results" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import xml.etree.ElementTree as ET, glob, sys
          files = glob.glob('app/build/test-results/testDebugUnitTest/TEST-*.xml')
          total = passed = failed = skipped = 0
          failures = []
          for f in files:
              tree = ET.parse(f)
              root = tree.getroot()
              for tc in root.findall('.//testcase'):
                  total += 1
                  if tc.find('failure') is not None:
                      failed += 1
                      failures.append(f\"{tc.get('classname')}.{tc.get('name')}\")
                  elif tc.find('skipped') is not None:
                      skipped += 1
                  else:
                      passed += 1
          print(f'| Passed | Failed | Skipped | Total |')
          print(f'|--------|--------|---------|-------|')
          print(f'| {passed} | {failed} | {skipped} | {total} |')
          if failures:
              print()
              print('### Failed Tests')
              for f in failures:
                  print(f'- {f}')
          " >> $GITHUB_STEP_SUMMARY

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: app/build/reports/lint-results*.html
          retention-days: 7

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
          retention-days: 7

  instrumented-tests:
    name: Instrumented Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        api-level: [31]
        target: [default]
        arch: [x86_64]
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup debug keystore
        run: |
          mkdir -p ~/.android
          echo '${{ secrets.DEBUG_KEYSTORE_BASE64 }}' | base64 -d > ~/.android/debug.keystore

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free up disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Cache AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-combined-${{ matrix.api-level }}-${{ matrix.target }}-${{ matrix.arch }}-v1

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 4096
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup test credentials
        run: |
          echo "🔐 Setting up test credentials for E2E testing..."
          echo '${{ secrets.TEST_CREDENTIALS_JSON }}' > test_credentials.json
          echo "✅ Test credentials file created"

      - name: Setup local.properties with OAuth client IDs
        run: |
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> local.properties
          echo "WEB_CLIENT_ID=${{ secrets.WEB_CLIENT_ID }}" >> local.properties
          echo "✅ OAuth client IDs added to local.properties"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 4096
          disable-animations: true
          script: |
            echo "🚀 Starting comprehensive instrumented tests with REAL credentials..."

            # Create log directories
            mkdir -p test-logs

            # Start logcat capture in background (capture everything)
            echo "📱 Starting comprehensive logcat capture..."
            adb logcat -v threadtime > test-logs/full-logcat.log 2>&1 &
            LOGCAT_PID=$!
            echo "✅ Logcat capture started (PID: $LOGCAT_PID)"

            # Wait for device and setup
            adb wait-for-device
            echo "⏳ Waiting for system boot..."
            sleep 15
            adb shell getprop sys.boot_completed
            sleep 10
            echo "Emulator should be ready!"

            # Device info logging
            echo "📱 Device Info:" | tee -a test-logs/test-summary.log
            adb shell getprop ro.product.model | tee -a test-logs/test-summary.log
            adb shell getprop ro.build.version.sdk | tee -a test-logs/test-summary.log
            echo "Test started at: $(date)" | tee -a test-logs/test-summary.log

            # Cleanup
            echo "🧹 Cleaning up any existing app installations..."
            adb uninstall com.example.whiz.debug || echo "No existing app to uninstall"
            adb uninstall com.example.whiz || echo "No existing app to uninstall"
            adb uninstall com.example.whiz.test || echo "No existing test app to uninstall"

            # Setup credentials
            echo "📁 Pushing test credentials to emulator..."
            adb push test_credentials.json /data/local/tmp/test_credentials.json

            # Build and install the app first
            echo "📦 Building and installing the app before running tests..."
            ./gradlew installDebug --stacktrace > test-logs/install-output.log 2>&1
            echo "✅ App installed successfully"
            
            # Grant necessary permissions AFTER app installation
            echo "🔐 Granting permissions to prevent dialog popups during tests..."
            # Grant overlay permission (Display over other apps)
            adb shell appops set com.example.whiz.debug SYSTEM_ALERT_WINDOW allow || echo "⚠️ Failed to grant overlay permission"
            # Enable accessibility service
            adb shell settings put secure enabled_accessibility_services com.example.whiz.debug/com.example.whiz.accessibility.WhizAccessibilityService || echo "⚠️ Failed to set accessibility service"
            adb shell settings put secure accessibility_enabled 1 || echo "⚠️ Failed to enable accessibility"
            # Additional permissions that might be needed
            adb shell pm grant com.example.whiz.debug android.permission.RECORD_AUDIO || echo "⚠️ Failed to grant RECORD_AUDIO"
            adb shell pm grant com.example.whiz.debug android.permission.POST_NOTIFICATIONS || echo "⚠️ Failed to grant POST_NOTIFICATIONS"
            echo "✅ Permissions granted: overlay, accessibility, and runtime permissions"
            sleep 2

            # Clear logcat before test execution to get clean test logs
            echo "🧹 Clearing logcat before test execution..."
            adb logcat -c

            # Restart focused logcat capture for test execution only
            kill $LOGCAT_PID 2>/dev/null || true
            adb logcat -v threadtime > test-logs/test-execution-logcat.log 2>&1 &
            LOGCAT_PID=$!
            echo "✅ Test execution logcat capture started (PID: $LOGCAT_PID)"

            echo "🧪 Running ALL tests with REAL credentials (no mocking)..." | tee -a test-logs/test-summary.log

            # Run tests and capture everything in single command block for GitHub Actions variable persistence
            echo "📊 Starting Gradle test execution..." | tee -a test-logs/test-summary.log; echo "Test execution started at: $(date)" | tee -a test-logs/test-summary.log; ./gradlew connectedDebugAndroidTest --stacktrace --continue > test-logs/gradle-output.log 2>&1; GRADLE_EXIT_CODE=$?; kill $LOGCAT_PID 2>/dev/null || true; echo "✅ Logcat capture stopped"; echo "" | tee -a test-logs/test-summary.log; echo "📋 Test execution completed with exit code: $GRADLE_EXIT_CODE" | tee -a test-logs/test-summary.log; echo "Test execution finished at: $(date)" | tee -a test-logs/test-summary.log; echo "" | tee -a test-logs/test-summary.log; echo "📊 Test Results Summary:" | tee -a test-logs/test-summary.log; echo "===========================================" | tee -a test-logs/test-summary.log; grep -E "(FAILED|PASSED|Tests.*completed)" test-logs/gradle-output.log | tee -a test-logs/test-summary.log || echo "No test result patterns found" | tee -a test-logs/test-summary.log; echo "" | tee -a test-logs/test-summary.log; echo "❌ Failed Tests Details:" | tee -a test-logs/test-summary.log; echo "===========================================" | tee -a test-logs/test-summary.log; grep -B2 -A2 "FAILED" test-logs/gradle-output.log | tee -a test-logs/test-summary.log || echo "No failed tests found" | tee -a test-logs/test-summary.log; echo "📸 IMMEDIATELY pulling screenshots while emulator is still online..." | tee -a test-logs/test-summary.log; echo "🔍 Checking emulator storage state..."; adb shell df -h | grep -E "(Filesystem|/sdcard)" || echo "Storage check failed"; echo "📱 Device info:"; adb shell getprop ro.product.model || echo "Device info failed"; adb shell getprop ro.build.version.sdk || echo "API level check failed"; echo "🔧 Checking screenshot directory on device..."; adb shell ls -la /sdcard/Download/test_screenshots/ 2>/dev/null || echo "No screenshots directory found"; echo "📁 All PNG files in screenshot directory:"; adb shell find /sdcard/Download/test_screenshots -name "*.png" -type f 2>/dev/null | head -20 || echo "No PNG files found"; echo "🔍 Extracting test failure logs..." | tee -a test-logs/test-summary.log; echo "===========================================" | tee -a test-logs/test-summary.log; adb logcat -d | grep -E "(FAIL WITH SCREENSHOT|Taking failure screenshot|Screenshot saved|BaseIntegrationTest)" > test-logs/test-failure-logcat.log || echo "No test failure logs found"; tail -50 test-logs/test-failure-logcat.log | tee -a test-logs/test-summary.log || echo "No recent failure logs" | tee -a test-logs/test-summary.log; echo "💾 Forcing file sync before pull..."; adb shell sync || echo "Sync failed"; sleep 1; echo "📁 Creating local directory and pulling screenshots..."; mkdir -p test-failure-screenshots; echo "🔄 Pulling screenshot directory (robust method)..."; adb pull /sdcard/Download/test_screenshots ./test-failure-screenshots/ 2>/dev/null && echo "✅ Screenshot directory pull succeeded" || echo "⚠️ Directory pull failed, trying individual files..."; if [ ! -f ./test-failure-screenshots/test_screenshots/*.png 2>/dev/null ]; then echo "🔄 Attempting individual file pulls..."; adb shell find /sdcard/Download/test_screenshots -name "*.png" -type f 2>/dev/null | while read file; do filename=$(basename "$file"); echo "📥 Pulling: $file -> $filename"; adb pull "$file" "./test-failure-screenshots/$filename" 2>/dev/null && echo "✅ $filename" || echo "❌ $filename"; done; fi; echo "" | tee -a test-logs/test-summary.log; echo "📄 Generated Log Files:" | tee -a test-logs/test-summary.log; echo "===========================================" | tee -a test-logs/test-summary.log; ls -la test-logs/ | tee -a test-logs/test-summary.log; echo "📱 Screenshot files pulled locally:"; ls -la ./test-failure-screenshots/ || echo "No screenshots directory created"; find ./test-failure-screenshots -name "*.png" 2>/dev/null | wc -l | xargs echo "PNG files found:"; echo "📄 Individual screenshot files:"; find ./test-failure-screenshots -name "*.png" 2>/dev/null | head -10 || echo "No PNG files found"; echo "📦 Preparing log files for upload..." | tee -a test-logs/test-summary.log; echo "" | tee -a test-logs/test-summary.log; echo "📊 Log File Summary:" | tee -a test-logs/test-summary.log; echo "===========================================" | tee -a test-logs/test-summary.log; if [ -f test-logs/gradle-output.log ]; then echo "Gradle output: $(wc -l < test-logs/gradle-output.log) lines, $(du -h test-logs/gradle-output.log | cut -f1)" | tee -a test-logs/test-summary.log; fi; if [ -f test-logs/test-execution-logcat.log ]; then echo "Test logcat: $(wc -l < test-logs/test-execution-logcat.log) lines, $(du -h test-logs/test-execution-logcat.log | cut -f1)" | tee -a test-logs/test-summary.log; fi; if [ -f test-logs/test-failure-logcat.log ]; then echo "Failure logs: $(wc -l < test-logs/test-failure-logcat.log) lines, $(du -h test-logs/test-failure-logcat.log | cut -f1)" | tee -a test-logs/test-summary.log; fi; echo ""; echo "📋 Final test result summary:" | tee -a test-logs/test-summary.log; if [ "$GRADLE_EXIT_CODE" -eq 0 ]; then echo "✅ All tests passed!" | tee -a test-logs/test-summary.log; else echo "❌ Some tests failed (exit code: $GRADLE_EXIT_CODE)" | tee -a test-logs/test-summary.log; echo "📸 Failure screenshots should be available above" | tee -a test-logs/test-summary.log; echo "📄 Detailed logs available in artifacts" | tee -a test-logs/test-summary.log; echo "⚠️ This will cause the CI to fail at the end, but screenshots were collected first" | tee -a test-logs/test-summary.log; fi; echo "Final summary completed at: $(date)" | tee -a test-logs/test-summary.log; exit $GRADLE_EXIT_CODE

      - name: Final verification and upload preparation
        if: always()
        run: |
          echo "🔍 Final screenshot verification for upload..."
          echo ""

          if [ -d "./test-failure-screenshots" ]; then
            echo "📱 Screenshot directory exists: ✅"
            
            # Check for both flat structure and nested structure (robust checking)
            png_count=$(find ./test-failure-screenshots -name "*.png" 2>/dev/null | wc -l)
            total_files=$(find ./test-failure-screenshots -type f 2>/dev/null | wc -l)
            
            echo "📊 File count summary:"
            echo "  Total files: $total_files"
            echo "  PNG files: $png_count"
            
            # Debug: show actual directory structure
            echo "📁 Complete directory structure:"
            find ./test-failure-screenshots -type f 2>/dev/null | head -15 || echo "No files found"
            
            if [ "$png_count" -gt 0 ]; then
              echo "✅ Screenshots ready for upload!"
              echo ""
              echo "📸 Screenshot details:"
              find ./test-failure-screenshots -name "*.png" -exec ls -lh {} \; 2>/dev/null | head -10
            else
              echo "ℹ️ No failure screenshots found (tests may have passed)"
              echo ""
              echo "📁 Directory contents (all levels):"
              find ./test-failure-screenshots -type f 2>/dev/null || echo "No files found"
            fi
          else
            echo "📁 Creating empty screenshots directory for upload consistency"
            mkdir -p ./test-failure-screenshots
          fi

          echo ""
          echo "📋 Upload summary: $(find ./test-failure-screenshots -name "*.png" 2>/dev/null | wc -l) PNG files ready"

      - name: Upload test failure screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-failure-screenshots-api${{ matrix.api-level }}
          path: test-failure-screenshots/
          retention-days: 30

      - name: Upload comprehensive test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: comprehensive-test-logs-api${{ matrix.api-level }}
          path: test-logs/
          retention-days: 30

      - name: Display log capture summary
        if: always()
        run: |
          echo "📊 COMPREHENSIVE LOG CAPTURE SUMMARY"
          echo "======================================"
          echo ""

          if [ -d "test-logs" ]; then
            echo "✅ Log files captured successfully:"
            echo ""
            ls -la test-logs/ || echo "No log files found"
            echo ""
            
            # Show test summary if available
            if [ -f "test-logs/test-summary.log" ]; then
              echo "📋 TEST SUMMARY (first 50 lines):"
              echo "----------------------------------------"
              head -50 test-logs/test-summary.log
              echo ""
              echo "📄 Full test summary available in artifacts: test-summary.log"
              echo ""
            fi
            
            # Show recent failure logs if available
            if [ -f "test-logs/test-failure-logcat.log" ]; then
              echo "❌ RECENT FAILURE LOGS (last 20 lines):"
              echo "----------------------------------------"
              tail -20 test-logs/test-failure-logcat.log
              echo ""
              echo "📄 Full failure logs available in artifacts: test-failure-logcat.log"
              echo ""
            fi
            
            # Show gradle test results snippet
            if [ -f "test-logs/gradle-output.log" ]; then
              echo "📊 GRADLE TEST RESULTS (key snippets):"
              echo "----------------------------------------"
              grep -E "(FAILED|PASSED|Tests.*completed|BUILD FAILED|BUILD SUCCESSFUL)" test-logs/gradle-output.log | tail -10 || echo "No test result patterns found"
              echo ""
              echo "📄 Full gradle output available in artifacts: gradle-output.log"
              echo ""
            fi
            
            echo "📦 DOWNLOADABLE ARTIFACTS:"
            echo "- comprehensive-test-logs-api${{ matrix.api-level }} (Contains all log files)"
            echo "- test-failure-screenshots-api${{ matrix.api-level }} (Contains failure screenshots)"
            echo ""
            echo "💡 TIP: Download these artifacts from the GitHub Actions 'Summary' page for detailed analysis."
            
          else
            echo "❌ No test logs directory found - log capture may have failed"
          fi

      - name: Generate instrumented test report
        if: success() || failure()
        run: |
          echo "## Instrumented Test Results (API ${{ matrix.api-level }})" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import xml.etree.ElementTree as ET, glob
          files = glob.glob('app/build/outputs/androidTest-results/connected/debug/TEST-*.xml')
          total = passed = failed = skipped = 0
          failures = []
          for f in files:
              tree = ET.parse(f)
              root = tree.getroot()
              for tc in root.findall('.//testcase'):
                  total += 1
                  if tc.find('failure') is not None:
                      failed += 1
                      failures.append(f\"{tc.get('classname')}.{tc.get('name')}\")
                  elif tc.find('skipped') is not None:
                      skipped += 1
                  else:
                      passed += 1
          print(f'| Passed | Failed | Skipped | Total |')
          print(f'|--------|--------|---------|-------|')
          print(f'| {passed} | {failed} | {skipped} | {total} |')
          if failures:
              print()
              print('### Failed Tests')
              for f in failures:
                  print(f'- {f}')
          " >> $GITHUB_STEP_SUMMARY

      - name: Debug - List test result files
        if: always()
        run: |
          echo "Searching for test result files..."
          find . -name "TEST-*.xml" -type f 2>/dev/null || echo "No TEST-*.xml files found"
          echo "Checking androidTest-results directory..."
          ls -la app/build/outputs/androidTest-results/ 2>/dev/null || echo "androidTest-results directory not found"
          echo "Checking if connected subdirectory exists..."
          ls -la app/build/outputs/androidTest-results/connected/ 2>/dev/null || echo "connected subdirectory not found"
          echo "Checking test-results directory..."
          ls -la app/build/test-results/ 2>/dev/null || echo "test-results directory not found"

      - name: Upload instrumented test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: instrumented-test-results-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/connected/
            app/build/outputs/androidTest-results/connected/
          retention-days: 7

  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup debug keystore
        run: |
          mkdir -p ~/.android
          echo '${{ secrets.DEBUG_KEYSTORE_BASE64 }}' | base64 -d > ~/.android/debug.keystore

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --parallel --build-cache --configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
