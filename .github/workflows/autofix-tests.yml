name: Autofix Verification Tests

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  autofix-verification:
    name: Autofix Verification
    if: startsWith(github.head_ref, 'autofix/')
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout whizvoiceapp
        uses: actions/checkout@v4

      - name: Checkout android_accessibility_tester
        uses: actions/checkout@v4
        with:
          repository: ruthgrace/android_accessibility_tester
          path: android_accessibility_tester

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free up disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          df -h

      - name: Install zstd
        run: sudo apt-get install -y zstd

      - name: Download x86_64 emulator snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/avd-snapshot-download.sh
          ./scripts/avd-snapshot-download.sh \
            --force \
            --release-tag emulator-snapshot-x86_64-v1 \
            --system-image "system-images;android-36;google_apis_playstore;x86_64" \
            --target-api 36

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install pytest
          pip install -e android_accessibility_tester

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup test credentials
        run: |
          echo '${{ secrets.TEST_CREDENTIALS_JSON }}' > test_credentials.json

      - name: Run autofix verification tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANDROID_ACCESSIBILITY_TESTER_PATH: ${{ github.workspace }}/android_accessibility_tester
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis_playstore
          arch: x86_64
          force-avd-creation: false
          avd-name: whiz-test-device
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 4096 -snapshot baseline_clean
          disable-animations: true
          script: |
            echo "Waiting for emulator boot..."
            adb wait-for-device
            sleep 15
            adb shell getprop sys.boot_completed
            sleep 5

            # Build and install debug APK
            ./gradlew assembleDebug --console=plain --quiet
            adb install -r app/build/outputs/apk/debug/app-debug.apk

            # Push test credentials
            adb push test_credentials.json /data/local/tmp/test_credentials.json

            # Grant permissions
            adb shell appops set com.example.whiz.debug SYSTEM_ALERT_WINDOW allow || true
            adb shell settings put secure enabled_accessibility_services com.example.whiz.debug/com.example.whiz.accessibility.WhizAccessibilityService || true
            adb shell settings put secure accessibility_enabled 1 || true
            adb shell pm grant com.example.whiz.debug android.permission.RECORD_AUDIO || true
            adb shell pm grant com.example.whiz.debug android.permission.POST_NOTIFICATIONS || true

            # Keep screen on
            adb shell settings put system screen_off_timeout 2147483647
            adb shell svc power stayon true

            # Run autofix tests
            mkdir -p autofix_test_output
            source venv/bin/activate
            export PYTHONPATH="${{ github.workspace }}/android_accessibility_tester:$PYTHONPATH"
            export ANDROID_HOME="${ANDROID_SDK_ROOT}"
            pytest autofix_tests/ -v --tb=short 2>&1 | tee autofix_test_output/pytest_output.log || PYTEST_EXIT=$?

            exit ${PYTEST_EXIT:-0}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autofix-test-output
          path: autofix_test_output/
          retention-days: 30
