name: Autofix Verification Tests

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  autofix-verification:
    name: Autofix Verification
    if: startsWith(github.head_ref, 'autofix/')
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout whizvoiceapp
        uses: actions/checkout@v4

      - name: Checkout android_accessibility_tester
        uses: actions/checkout@v4
        with:
          repository: ruthgrace/android_accessibility_tester
          path: android_accessibility_tester

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free up disk space
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /usr/local/share/powershell
          df -h

      - name: Install zstd
        run: sudo apt-get install -y zstd

      - name: Download x86_64 emulator snapshot
        id: download-snapshot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/avd-snapshot-download.sh
          ./scripts/avd-snapshot-download.sh \
            --force \
            --release-tag emulator-snapshot-x86_64-v2 \
            --system-image "system-images;android-36;google_apis_playstore;x86_64" \
            --target-api 36
          # Read emulator build saved by download script
          BUILD_FILE="$HOME/.android/avd/whiz-test-device.avd/snapshot_emulator_build.txt"
          if [[ -f "$BUILD_FILE" ]]; then
            EMULATOR_BUILD=$(cat "$BUILD_FILE")
            echo "emulator_build=${EMULATOR_BUILD}" >> "$GITHUB_OUTPUT"
            echo "==> Using emulator build from snapshot: ${EMULATOR_BUILD}"
          fi

      - name: Setup ADB keys
        run: |
          mkdir -p ~/.android
          echo '${{ secrets.ADB_PRIVATE_KEY }}' > ~/.android/adbkey
          chmod 600 ~/.android/adbkey
          ssh-keygen -y -f ~/.android/adbkey > ~/.android/adbkey.pub 2>/dev/null || adb keygen ~/.android/adbkey.pub || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install pytest
          pip install -e android_accessibility_tester

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Setup debug keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 -d > ~/.android/debug.keystore
          echo "==> Debug keystore SHA-1:"
          keytool -list -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey 2>&1 | grep SHA1

      - name: Build debug APK
        run: ./gradlew assembleDebug --console=plain

      - name: Verify APK signing
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          echo "==> APK signing certificate:"
          apksigner verify --print-certs "$APK" 2>&1 || true

      - name: Setup test credentials
        run: |
          echo '${{ secrets.TEST_CREDENTIALS_JSON }}' > test_credentials.json

      - name: Create QCOW2 restore script
        run: |
          AVD_DIR="$HOME/.android/avd/whiz-test-device.avd"
          BACKUP_DIR="/tmp/qcow2-backup"

          # Back up QCOW2 files now (before emulator-runner modifies config.ini)
          mkdir -p "$BACKUP_DIR"
          echo "==> Backing up QCOW2 overlay files..."
          for f in cache.img.qcow2 userdata-qemu.img.qcow2 encryptionkey.img.qcow2; do
            if [ -f "$AVD_DIR/$f" ]; then
              cp "$AVD_DIR/$f" "$BACKUP_DIR/$f"
              echo "    Backed up $f ($(du -sh "$AVD_DIR/$f" | cut -f1))"
            fi
          done

          # Write restore script (emulator-runner executes pre-launch script
          # line-by-line in separate shells, so we need a single script file)
          printf '%s\n' '#!/usr/bin/env bash' \
            'set -euo pipefail' \
            'AVD_DIR="$HOME/.android/avd/whiz-test-device.avd"' \
            'BACKUP_DIR="/tmp/qcow2-backup"' \
            'echo "==> Restoring QCOW2 overlay files after config.ini modification..."' \
            'for f in cache.img.qcow2 userdata-qemu.img.qcow2 encryptionkey.img.qcow2; do' \
            '  if [ -f "$BACKUP_DIR/$f" ]; then' \
            '    cp "$BACKUP_DIR/$f" "$AVD_DIR/$f"' \
            '    echo "    Restored $f"' \
            '  else' \
            '    echo "    WARNING: $BACKUP_DIR/$f not found!"' \
            '  fi' \
            'done' \
            'echo "==> Enabling QCOW2 overlay in config.ini..."' \
            'sed -i "s/userdata.useQcow2 = no/userdata.useQcow2 = yes/" "$AVD_DIR/config.ini"' \
            'grep userdata.useQcow2 "$AVD_DIR/config.ini"' \
            'echo "==> Adding hw.cpu.ncore=2 to snapshot hardware.ini..."' \
            'echo "hw.cpu.ncore=2" >> "$AVD_DIR/snapshots/baseline_clean/hardware.ini"' \
            'echo "==> Restore complete."' \
            > /tmp/restore-qcow2.sh
          chmod +x /tmp/restore-qcow2.sh

      - name: Run autofix verification tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANDROID_ACCESSIBILITY_TESTER_PATH: ${{ github.workspace }}/android_accessibility_tester
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis_playstore
          arch: x86_64
          emulator-build: ${{ steps.download-snapshot.outputs.emulator_build }}
          force-avd-creation: false
          avd-name: whiz-test-device
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 4096 -snapshot baseline_clean -no-snapshot-save
          disable-animations: true
          pre-emulator-launch-script: /tmp/restore-qcow2.sh
          script: bash scripts/run-autofix-tests.sh

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: autofix-test-output
          path: autofix_test_output/
          retention-days: 30
