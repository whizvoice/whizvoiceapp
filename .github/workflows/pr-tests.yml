name: PR Unit Tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "**"
      - "!README.md"

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  quick-checks:
    name: Quick Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run lint and tests
        run: ./gradlew lintDebug test --stacktrace --parallel --build-cache --configuration-cache

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Unit Test Results
          path: "app/build/test-results/test*/TEST-*.xml"
          reporter: java-junit
          fail-on-error: true
